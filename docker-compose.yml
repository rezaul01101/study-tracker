services:
  backend:
    build:
      context: ./backend
    container_name: study-tracker-backend
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
    volumes:
      - ./backend/storage:/app/storage
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_ORIGIN: ""
    container_name: study-tracker-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
